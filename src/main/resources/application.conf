server {
  port = 8080
  preWait = "5s"
}

database {
  vaultJdbcUrl = "${JDBC_URL:-}"
  dbCredentialsMountPath = "${DB_CREDENTIALS_MOUNT_PATH:-}"
  maxConnectionPoolSizeForUser = "4"
  maxConnectionPoolSizeForAdmin = "1"
}

environment {
  naisClusterName = "${NAIS_CLUSTER_NAME:-local}"
}

kafka {
  groupId = "emottak-event-manager"
}

eventConsumer {
  active = "${ENABLE_EVENT_RECEIVER:-false}"
  eventTopic = "team-emottak.event.log"
  messageDetailsTopic = "team-emottak.ebms.message.details"
  consumerGroupId = "emottak-event-manager"
}

delayedJobs {
    delayInMinutes = 10
}

# HopLite leser miljøvariablene NAV_PARTY_IDS_0, NAV_PARTY_IDS_1, osv og gjenkjenner dette som en liste: NAV_PARTY_IDS.
# Disse er definert i nais-console => configs => emottak-event-manager-config.
# I denne filen defineres default-verdier hvis miljøvariablene mangler:
navPartyIds = ["HER:79768", "HER:111949", "ENH:889640782", "ENH:990983291", "orgnummer:889640782", "orgnummer:990983291", "commonname:ARBEIDS OG VELFERDSETATEN"]